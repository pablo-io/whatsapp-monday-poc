services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${POSTGRES_PASSWORD}@postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://bridge:8000/webhook/evolution
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
    ports:
      # Solo en loopback: para escanear el QR en el Manager UI via tunel SSH
      # (ssh -L 8080:localhost:8080 ...), nunca expuesto a internet.
      - "127.0.0.1:8080:8080"
    volumes:
      - evolution_data:/evolution/instances

  bridge:
    build: ./bridge
    restart: unless-stopped
    depends_on:
      - evolution-api
    environment:
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      MONDAY_API_TOKEN: ${MONDAY_API_TOKEN}
      MONDAY_BOARD_ID: ${MONDAY_BOARD_ID}
      MONDAY_PHONE_COLUMN_ID: ${MONDAY_PHONE_COLUMN_ID}
      MONDAY_REPLY_COLUMN_ID: ${MONDAY_REPLY_COLUMN_ID}
      MONDAY_SEND_COLUMN_ID: ${MONDAY_SEND_COLUMN_ID}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - bridge
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  caddy_data:
  caddy_config:
